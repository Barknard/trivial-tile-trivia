    <script>
      // Dynamic Quiz Loader - fetches categories from output/ directory
      window.__dynamicQuizData = {};
      window.__dynamicQuizReady = fetch('/api/quiz-themes')
        .then(r => r.json())
        .then(async ({ themes }) => {
          const entries = Object.entries(themes || {});
          if (!entries.length) return;
          const results = await Promise.all(
            entries.map(([id]) => fetch('/api/quiz-data/' + id).then(r => r.json()).then(d => [id, d]))
          );
          for (const [id, data] of results) {
            window.__dynamicQuizData[id] = data;
          }
          console.log('[DynamicQuiz] Loaded', results.length, 'dynamic themes:', Object.keys(window.__dynamicQuizData));
        })
        .catch(err => console.warn('[DynamicQuiz] Failed to load:', err));
    </script>

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered'))
            .catch(err => console.log('SW registration failed:', err));
        });
